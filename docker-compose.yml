services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
      POSTGRES_DB: scheduler_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler -d scheduler_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Flask backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      FLASK_APP: run.py
      FLASK_ENV: development
      DATABASE_URL: postgresql://scheduler:scheduler@db:5432/scheduler_db
      SECRET_KEY: dev-secret-change-in-production
      SKIP_ADVISORY_LOCKS: "false"
      GUNICORN_WORKERS: "4"
      GUNICORN_BIND: "0.0.0.0:5000"
      SEED_DB: "false"
    ports:
      - "5001:5000"
    depends_on:
      db:
        condition: service_healthy

  # ── React frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ── One-shot seeder (docker compose run --rm seeder) ──────────────────────
  seeder:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    environment:
      FLASK_APP: run.py
      DATABASE_URL: postgresql://scheduler:scheduler@db:5432/scheduler_db
      SECRET_KEY: dev-secret
      SKIP_ADVISORY_LOCKS: "false"
      SEED_DB: "true"
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["sh", "-c", "alembic upgrade head && flask seed-db"]
    profiles:
      - seed

  # ── Tests: SQLite (fast, no Postgres needed) ──────────────────────────────
  test:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: test
    environment:
      FLASK_APP: run.py
      SECRET_KEY: test-secret
    profiles:
      - test

  # ── Tests: PostgreSQL (includes advisory lock concurrency tests) ───────────
  test-pg:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: test
    environment:
      FLASK_APP: run.py
      SECRET_KEY: test-secret
      TEST_DATABASE_URL: postgresql://scheduler:scheduler@db:5432/scheduler_test
      PGHOST: db
      PGUSER: scheduler
      PGPASSWORD: scheduler
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["sh", "entrypoint.test.sh"]
    profiles:
      - test-pg

volumes:
  postgres_data:
