name: CI — Unit Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-postgres:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: scheduler
          POSTGRES_PASSWORD: scheduler
          POSTGRES_DB: scheduler_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scheduler -d scheduler_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build test image
        run: |
          docker build \
            --target test \
            --tag scheduler-test \
            ./backend

      - name: Run migrations
        run: |
          docker run --rm \
            --network host \
            -e FLASK_APP=run.py \
            -e SECRET_KEY=ci-secret \
            -e TEST_DATABASE_URL=postgresql://scheduler:scheduler@localhost:5432/scheduler_test \
            scheduler-test \
            alembic upgrade head

      - name: Run tests
        run: |
          docker run --rm \
            --network host \
            -e FLASK_APP=run.py \
            -e SECRET_KEY=ci-secret \
            -e TEST_DATABASE_URL=postgresql://scheduler:scheduler@localhost:5432/scheduler_test \
            scheduler-test \
            python -m pytest tests/ -v --tb=short
